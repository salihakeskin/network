<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Gelişmiş Ağ Akademisi</title>
    <style>
        :root { --main: #9E0B2D; --bg: #0f172a; --panel: #1e293b; --text: #f8fafc; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        .navbar { background: var(--main); padding: 12px 25px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 100; }
        .main-container { display: flex; flex: 1; overflow: hidden; }

        .sidebar { width: 260px; background: var(--panel); border-right: 1px solid #334155; padding: 15px; display: flex; flex-direction: column; gap: 8px; z-index: 90; }
        .sidebar h3 { font-size: 0.8rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .lab-btn { background: #334155; border: 1px solid #475569; color: white; padding: 10px; border-radius: 6px; cursor: pointer; text-align: left; transition: 0.3s; font-size: 0.85rem; }
        .lab-btn:hover { background: #475569; border-color: var(--main); }
        .lab-btn.active { background: var(--main); border-color: white; font-weight: bold; }

        /* Simülasyon Alanı - Cihazların Göründüğü Yer */
        .canvas-area { flex: 1; position: relative; background: radial-gradient(circle, #1e293b 1px, transparent 1px); background-size: 40px 40px; overflow: hidden; }
        #network-canvas { width: 100%; height: 100%; position: relative; }
        svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        line { stroke: #475569; stroke-width: 2; stroke-dasharray: 4; transition: 0.3s; }

        .device { position: absolute; width: 70px; text-align: center; z-index: 10; transition: 0.3s; }
        .device img { width: 45px; filter: drop-shadow(0 0 8px rgba(255,255,255,0.2)); }
        .device span { display: block; font-size: 11px; margin-top: 5px; color: #cbd5e1; font-weight: 500; }

        .packet { position: absolute; width: 12px; height: 12px; background: #fbbf24; border-radius: 50%; box-shadow: 0 0 15px #fbbf24; z-index: 50; display: none; }

        .footer { height: 160px; background: #020617; border-top: 2px solid var(--main); display: flex; padding: 10px; gap: 15px; z-index: 100; }
        .terminal { flex: 1; font-family: 'Consolas', monospace; font-size: 12px; color: #10b981; overflow-y: auto; padding: 8px; border-radius: 4px; background: #000; }
        .info-card { width: 280px; background: var(--panel); border-radius: 6px; padding: 12px; font-size: 0.8rem; line-height: 1.4; }
    </style>
</head>
<body>

<div class="navbar">
    <div style="font-size: 1.1rem; font-weight: 800;">AĞ AKADEMİSİ</div>
    <div id="current-lab-name" style="font-size: 0.85rem; color: #fbbf24;">Level 1: Local Network</div>
</div>

<div class="main-container">
    <div class="sidebar">
        <h3>Eğitim Modülleri</h3>
        <button class="lab-btn active" onclick="loadLab(1, this)">1. Switch (LAN)</button>
        <button class="lab-btn" onclick="loadLab(2, this)">2. Router (WAN)</button>
        <button class="lab-btn" onclick="loadLab(3, this)">3. Web Server (HTTP)</button>
        <button class="lab-btn" onclick="loadLab(4, this)">4. Access Point (WiFi)</button>
        <div style="margin-top:auto; padding-top:10px; border-top:1px solid #334155;">
            <button id="run-btn" class="lab-btn" style="background:#04AA6D; width:100%; text-align:center;" onclick="startSimulation()">SİMÜLASYONU ÇALIŞTIR ▶</button>
        </div>
    </div>

    <div class="canvas-area">
        <svg id="svg-canvas"></svg>
        <div id="network-canvas"></div>
        <div id="packet" class="packet"></div>
    </div>
</div>

<div class="footer">
    <div class="terminal" id="log">
        [SİSTEM] Modül hazır. Bir senaryo seçip başlatın...
    </div>
    <div class="info-card" id="description">
        <b>Senaryo Özeti:</b><br>
        Cihazların bir Switch üzerinden haberleşmesini izleyin.
    </div>
</div>

<script>
    // Konumlar (x, y) yukarı taşındı (y değerleri küçültüldü)
    const labs = {
        1: {
            name: "Level 1: Local Network (Switch)",
            desc: "Switch cihazı, gelen paketi sadece hedefin olduğu porta yönlendirerek ağ trafiğini optimize eder.",
            devices: [
                { id: 'pc1', type: 'pc', label: 'PC-A', x: 80, y: 100 },
                { id: 'pc2', type: 'pc', label: 'PC-B', x: 80, y: 280 },
                { id: 'sw1', type: 'switch', label: 'L2 Switch', x: 350, y: 190 }
            ],
            links: [['pc1', 'sw1'], ['pc2', 'sw1']],
            flow: ['pc1', 'sw1', 'pc2', 'sw1', 'pc1'],
            msgs: ["PC-A: Paket Switch'e gönderiliyor...", "Switch: MAC tablosuna bakılıyor...", "PC-B: Paket alındı, onay dönülüyor.", "İşlem Tamam: LAN trafiği başarılı."]
        },
        2: {
            name: "Level 2: Routing (Router)",
            desc: "Farklı ağlardaki (Subnet) cihazlar bir Router aracılığıyla haberleşir. Router, IP adreslerini kontrol eder.",
            devices: [
                { id: 'pc1', type: 'pc', label: '192.168.1.5', x: 50, y: 190 },
                { id: 'rt1', type: 'router', label: 'Router', x: 300, y: 190 },
                { id: 'pc2', type: 'pc', label: '10.0.0.10', x: 550, y: 190 }
            ],
            links: [['pc1', 'rt1'], ['pc2', 'rt1']],
            flow: ['pc1', 'rt1', 'pc2'],
            msgs: ["PC-A: Gateway'e paket gönderiliyor...", "Router: Hedef ağ kontrol ediliyor...", "Yönlendirme: Paket 10.0.0.x ağına iletildi."]
        },
        3: {
            name: "Level 3: Web & HTTP (Server)",
            desc: "İstemci tarayıcı üzerinden bir istek (Request) gönderir ve sunucudan yanıt (Response) alır.",
            devices: [
                { id: 'pc1', type: 'pc', label: 'Client', x: 80, y: 190 },
                { id: 'sw1', type: 'switch', label: 'Ağ', x: 320, y: 190 },
                { id: 'srv1', type: 'server', label: 'Web Server', x: 560, y: 190 }
            ],
            links: [['pc1', 'sw1'], ['srv1', 'sw1']],
            flow: ['pc1', 'sw1', 'srv1', 'sw1', 'pc1'],
            msgs: ["Client: HTTP GET isteği gönderildi.", "Switch: Veri sunucu yolunda...", "Server: HTTP 200 OK yanıtı dönüyor.", "Web sayfası başarıyla yüklendi."]
        },
        4: {
            name: "Level 4: Wireless (Access Point)",
            desc: "Kablosuz cihazlar radyo dalgalarıyla AP'ye bağlanır. AP ise bu veriyi kablolu ağa aktarır.",
            devices: [
                { id: 'phone', type: 'phone', label: 'Mobile', x: 60, y: 100 },
                { id: 'laptop', type: 'pc', label: 'Laptop', x: 60, y: 280 },
                { id: 'ap1', type: 'ap', label: 'AP', x: 300, y: 190 },
                { id: 'modem', type: 'router', label: 'Modem', x: 550, y: 190 }
            ],
            links: [['phone', 'ap1', 'wireless'], ['laptop', 'ap1', 'wireless'], ['ap1', 'modem']],
            flow: ['phone', 'ap1', 'modem'],
            msgs: ["Mobile: WiFi üzerinden paket gönderildi.", "AP: Veri kablolu hatta çevriliyor...", "Modem: İnternet isteği dış ağa aktarıldı."]
        }
    };

    let currentLabId = 1;
    const icons = {
        pc: 'https://cdn-icons-png.flaticon.com/512/3067/3067260.png',
        switch: 'https://cdn-icons-png.flaticon.com/512/2885/2885417.png',
        router: 'https://cdn-icons-png.flaticon.com/512/262/262334.png',
        server: 'https://cdn-icons-png.flaticon.com/512/2333/2333246.png',
        ap: 'https://cdn-icons-png.flaticon.com/512/9132/9132644.png',
        phone: 'https://cdn-icons-png.flaticon.com/512/254/254638.png'
    };

    function loadLab(id, btn) {
        currentLabId = id;
        document.querySelectorAll('.lab-btn').forEach(b => b.classList.remove('active'));
        if(btn) btn.classList.add('active');
        
        const lab = labs[id];
        document.getElementById('current-lab-name').innerText = lab.name;
        document.getElementById('description').innerHTML = `<b>Senaryo Özeti:</b><br>${lab.desc}`;
        document.getElementById('log').innerHTML = `[SİSTEM] ${lab.name} yüklendi.`;
        
        renderCanvas(lab);
    }

    function renderCanvas(lab) {
        const container = document.getElementById('network-canvas');
        const svg = document.getElementById('svg-canvas');
        container.innerHTML = "";
        svg.innerHTML = "";

        lab.devices.forEach(d => {
            const div = document.createElement('div');
            div.className = 'device';
            div.id = d.id;
            div.style.left = d.x + 'px';
            div.style.top = d.y + 'px';
            div.innerHTML = `<img src="${icons[d.type]}" style="filter:invert(1)"><span>${d.label}</span>`;
            container.appendChild(div);
        });

        lab.links.forEach(l => {
            const d1 = lab.devices.find(x => x.id === l[0]);
            const d2 = lab.devices.find(x => x.id === l[1]);
            const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
            line.setAttribute("x1", d1.x + 35);
            line.setAttribute("y1", d1.y + 25);
            line.setAttribute("x2", d2.x + 35);
            line.setAttribute("y2", d2.y + 25);
            if(l[2] === 'wireless') line.style.strokeDasharray = "2,8";
            svg.appendChild(line);
        });
    }

    async function startSimulation() {
        const lab = labs[currentLabId];
        const packet = document.getElementById('packet');
        const log = document.getElementById('log');
        const runBtn = document.getElementById('run-btn');
        
        runBtn.disabled = true;
        log.innerHTML = "";

        for (let i = 0; i < lab.flow.length - 1; i++) {
            const startNode = document.getElementById(lab.flow[i]);
            const endNode = document.getElementById(lab.flow[i+1]);
            
            if(lab.msgs[i]) log.innerHTML += `<span style="color:#fbbf24">></span> ${lab.msgs[i]}<br>`;
            log.scrollTop = log.scrollHeight;

            const sPos = { x: parseInt(startNode.style.left) + 30, y: parseInt(startNode.style.top) + 20 };
            const ePos = { x: parseInt(endNode.style.left) + 30, y: parseInt(endNode.style.top) + 20 };

            packet.style.display = "block";
            packet.style.transition = "none";
            packet.style.left = sPos.x + "px";
            packet.style.top = sPos.y + "px";

            await new Promise(r => setTimeout(r, 100));
            packet.style.transition = "all 1s ease-in-out";
            packet.style.left = ePos.x + "px";
            packet.style.top = ePos.y + "px";

            await new Promise(r => setTimeout(r, 1100));
        }

        log.innerHTML += `<b style="color:#04AA6D">> Akış başarıyla tamamlandı.</b><br>`;
        packet.style.display = "none";
        runBtn.disabled = false;
    }

    window.onload = () => loadLab(1);
</script>

</body>
</html>
