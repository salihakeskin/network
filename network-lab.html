<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Görsel Ağ Simülasyonu</title>
    <style>
        :root { --main: #9E0B2D; --bg: #0f172a; --line: #334155; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        .header { background: var(--main); padding: 15px; text-align: center; font-weight: bold; font-size: 1.2rem; }
        
        /* Simülasyon Alanı */
        #network-canvas { width: 100vw; height: 70vh; position: relative; background: radial-gradient(circle, #1e293b 1px, transparent 1px); background-size: 30px 30px; }

        .device { position: absolute; width: 80px; text-align: center; cursor: pointer; transition: 0.3s; z-index: 10; }
        .device:hover { transform: scale(1.1); }
        .device img { width: 50px; display: block; margin: 0 auto; filter: drop-shadow(0 0 5px rgba(255,255,255,0.3)); }
        .device span { font-size: 12px; display: block; margin-top: 5px; background: rgba(0,0,0,0.5); border-radius: 4px; }

        /* Kablo Çizgileri */
        svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        line { stroke: var(--line); stroke-width: 3; stroke-dasharray: 5; animation: dash 5s linear infinite; }
        @keyframes dash { to { stroke-dashoffset: 50; } }

        /* Veri Paketi Animasyonu */
        .packet { position: absolute; width: 15px; height: 15px; background: #fbbf24; border-radius: 50%; box-shadow: 0 0 10px #fbbf24; z-index: 20; display: none; }

        /* Kontrol Paneli */
        .controls { height: 20vh; background: #1e293b; padding: 20px; display: flex; gap: 20px; border-top: 2px solid var(--main); }
        .log-area { flex: 1; background: #000; padding: 10px; font-family: monospace; font-size: 13px; color: #00ff00; overflow-y: auto; border-radius: 5px; }
        .btn { background: var(--main); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; height: fit-content; font-weight: bold; }
        .btn:hover { background: #7a0822; }
    </style>
</head>
<body>

<div class="header">İnteraktif Ağ Topolojisi Simülatörü</div>

<div id="network-canvas">
    <svg id="svg-canvas"></svg>
    <div id="packet" class="packet"></div>

    <div class="device" style="top:250px; left:100px;" id="pc1" onclick="selectDevice('pc1')">
        <img src="https://cdn-icons-png.flaticon.com/512/3067/3067260.png" style="filter: invert(1);">
        <span>PC-A (192.168.1.5)</span>
    </div>

    <div class="device" style="top:250px; left:450px;" id="switch">
        <img src="https://cdn-icons-png.flaticon.com/512/2885/2885417.png" style="filter: invert(1);">
        <span>L2-Switch</span>
    </div>

    <div class="device" style="top:100px; left:800px;" id="pc2" onclick="selectDevice('pc2')">
        <img src="https://cdn-icons-png.flaticon.com/512/3067/3067260.png" style="filter: invert(1);">
        <span>PC-B (192.168.1.10)</span>
    </div>

    <div class="device" style="top:400px; left:800px;" id="server" onclick="selectDevice('server')">
        <img src="https://cdn-icons-png.flaticon.com/512/2333/2333246.png" style="filter: invert(1);">
        <span>Web-Server (1.1.1.1)</span>
    </div>
</div>

<div class="controls">
    <div style="display:flex; flex-direction:column; gap:10px;">
        <button class="btn" onclick="sendPing()">Ping Gönder (PC-A -> PC-B)</button>
        <button class="btn" style="background:#04AA6D" onclick="location.reload()">Sıfırla</button>
    </div>
    <div class="log-area" id="log">
        [Sistem] Simülasyon hazır. Bir işlem seçin...<br>
    </div>
</div>

<script>
    const log = document.getElementById('log');
    const packet = document.getElementById('packet');

    // Kabloları Çiz
    function drawWires() {
        const svg = document.getElementById('svg-canvas');
        const connections = [
            ['pc1', 'switch'],
            ['pc2', 'switch'],
            ['server', 'switch']
        ];

        connections.forEach(conn => {
            const d1 = document.getElementById(conn[0]).getBoundingClientRect();
            const d2 = document.getElementById(conn[1]).getBoundingClientRect();
            
            const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
            line.setAttribute("x1", d1.left + 40);
            line.setAttribute("y1", d1.top + 25);
            line.setAttribute("x2", d2.left + 40);
            line.setAttribute("y2", d2.top + 25);
            svg.appendChild(line);
        });
    }

    function addLog(msg) {
        log.innerHTML += `> ${msg}<br>`;
        log.scrollTop = log.scrollHeight;
    }

    async function animatePacket(startId, endId) {
        const start = document.getElementById(startId).getBoundingClientRect();
        const end = document.getElementById(endId).getBoundingClientRect();
        
        packet.style.display = "block";
        packet.style.left = (start.left + 35) + "px";
        packet.style.top = (start.top + 20) + "px";

        await new Promise(r => setTimeout(r, 100));
        
        packet.style.transition = "all 1.5s linear";
        packet.style.left = (end.left + 35) + "px";
        packet.style.top = (end.top + 20) + "px";
        
        return new Promise(r => setTimeout(r, 1500));
    }

    async function sendPing() {
        addLog("ICMP Paketi oluşturuluyor...");
        addLog("Kaynak: 192.168.1.5 (PC-A)");
        
        // PC1 -> Switch
        await animatePacket('pc1', 'switch');
        addLog("Switch: Mac adresi öğreniliyor, paket yönlendiriliyor...");
        
        // Switch -> PC2
        await animatePacket('switch', 'pc2');
        addLog("Hedef Ulaştı: PC-B yanıt veriyor (Echo Reply)...");

        // Geri Dönüş
        await animatePacket('pc2', 'switch');
        await animatePacket('switch', 'pc1');
        
        addLog("<span style='color:yellow'>Ping Başarılı: 0% kayıp, Süre: 14ms</span>");
        packet.style.display = "none";
        packet.style.transition = "none";
    }

    window.onload = drawWires;
</script>

</body>
</html>
